name: Diagnose Vitus/Apotera

on:
  workflow_dispatch:
  push:
    branches:
      - claude/vitus-apotera-price-fetch-xll72p

jobs:
  diagnose:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          playwright install chromium
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Run diagnostics
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/diagnose_vitus_apotera.py

      - name: Upload HTML dumps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diag-html
          path: scraper/diag_out/
